services:
  db:
    image: postgres:latest
    container_name: ems-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zidhan24
      POSTGRES_DB: ems_db
    ports:
      - "5432:5432"
    volumes:
      - ems-pg-data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ems-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:zidhan24@db:5432/ems_db
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: always

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ems-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: always

volumes:
  ems-pg-data:
